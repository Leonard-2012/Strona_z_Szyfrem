<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szyf Leonarda Królczyka</title>
</head>
<body>
    <a href='{{ url_for("index") }}'>&lAarr; Powrót do menu</a>
    <h2>Ćwiczenia z szyfrem</h2>
    <h3>Szyfr zadziała dla wszystkich symboli na klawiaturze polskiej poza znakami uzyskiwanymi z ctrl/option za wyjątkiem ą,ć,ę,ń,ł,ó,ś,ż,ź.</h3>
    <h4>Wpisz w poniższą ankietę hasło które chcesz zszyfrować.</h4>
    <form method="post" action="/cwiczenia_odp">
        <p>wiadomość: <input type="text" name="wiadomosc" size="100" required></p>
        <p>Wybierz poziom zbezpieczeń:</p>
        <input type="radio" name="poziom" value="0" required>0
        <br>
        <input type="radio" name="poziom" value="1">1
        <br>
        <input type="radio" name="poziom" value="2">2
        <br>
        <input type="radio" name="poziom" value="3">3
        <br>
        <button type="submit">
            Wyślij
        </button>
    </form>
</body>
</html>
