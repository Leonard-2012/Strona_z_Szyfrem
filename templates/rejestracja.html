<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szyfr Leonarda Królczyka</title>
    <style>
    male {
    color: red;
    font-size: 12px;
    }
    </style>
</head>
<body>
    <a href='{{ url_for("index") }}'>&lAarr; Powrót do menu</a>
    <h1>Rejestracja</h1>
    <form method="post">
        <p>Login:</p>
        <input type="text" name="login" size="20" required>
        <p>Hasło:</p>
        <input type="text" name="haslo" size="20" required>
        <br>
        {% if zle %}
        <male>Niepoprawny login lub hasło.</male>
        {% endif %}
        <br>
        <button type="submit">Zarejesrtruj się</button>
        <hr>
        <h5>Masz konto?</h5>
        <h5>Zaloguj się <a href="{{ url_for( 'logowanie' ) }}">tutaj</a></h5>
    </form>
</body>
</html>
